name: Build Runner Images

on:
  push:
    branches: [main]
    paths:
      - "images/**"
  workflow_dispatch:
    inputs:
      ubuntu_version:
        description: "Ubuntu version to build (blank = both)"
        required: false
        type: choice
        options:
          - ""
          - "2404"
          - "2204"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io/camdenclark

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - base_image: "ubuntu:24.04"
            os: ubuntu24
            version: "2404"
            toolset: toolsets/toolset-2404.json
          - base_image: "ubuntu:22.04"
            os: ubuntu22
            version: "2204"
            toolset: toolsets/toolset-2204.json
    steps:
      - uses: actions/checkout@v4

      - name: Set image name
        run: echo "IMAGE_NAME=localactions" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        run: echo "${{ github.token }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Set timestamp
        if: >-
          github.event_name != 'workflow_dispatch' ||
          github.event.inputs.ubuntu_version == '' ||
          github.event.inputs.ubuntu_version == matrix.version
        run: echo "TIMESTAMP=$(date +%Y%m%d%H%M%S)" >> "$GITHUB_ENV"

      - name: Build image
        if: >-
          github.event_name != 'workflow_dispatch' ||
          github.event.inputs.ubuntu_version == '' ||
          github.event.inputs.ubuntu_version == matrix.version
        working-directory: images
        run: |
          docker build \
            --build-arg BASE_IMAGE=${{ matrix.base_image }} \
            --build-arg IMAGE_OS=${{ matrix.os }} \
            --build-arg TOOLSET_FILE=${{ matrix.toolset }} \
            -t ${REGISTRY}/${IMAGE_NAME}:${{ matrix.os }} \
            -t ${REGISTRY}/${IMAGE_NAME}:${{ matrix.os }}-${TIMESTAMP} \
            .

      - name: Push image
        if: >-
          github.event_name != 'workflow_dispatch' ||
          github.event.inputs.ubuntu_version == '' ||
          github.event.inputs.ubuntu_version == matrix.version
        run: |
          docker push ${REGISTRY}/${IMAGE_NAME}:${{ matrix.os }}
          docker push ${REGISTRY}/${IMAGE_NAME}:${{ matrix.os }}-${TIMESTAMP}
