name: Build Runner Images

on:
  push:
    branches: [main]
    paths:
      - "images/**"
  workflow_dispatch:
    inputs:
      ubuntu_version:
        description: "Ubuntu version to build (blank = both)"
        required: false
        type: choice
        options:
          - ""
          - "2404"
          - "2204"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: localactions-registry.camdenclark.workers.dev

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - varfile: ubuntu2404.pkrvars.hcl
            os: ubuntu24
            version: "2404"
          - varfile: ubuntu2204.pkrvars.hcl
            os: ubuntu22
            version: "2204"
    steps:
      - uses: actions/checkout@v4

      - name: Set image name
        run: echo "IMAGE_NAME=localactions" >> "$GITHUB_ENV"

      - name: Setup Packer
        uses: hashicorp/setup-packer@main
        with:
          version: latest

      - name: Install crane
        run: |
          VERSION=$(curl -s https://api.github.com/repos/google/go-containerregistry/releases/latest | jq -r .tag_name)
          curl -sL "https://github.com/google/go-containerregistry/releases/download/${VERSION}/go-containerregistry_Linux_x86_64.tar.gz" | sudo tar -xzf - -C /usr/local/bin crane

      - name: Initialize Packer
        if: >-
          github.event_name != 'workflow_dispatch' ||
          github.event.inputs.ubuntu_version == '' ||
          github.event.inputs.ubuntu_version == matrix.version
        working-directory: images
        run: packer init .

      - name: Build image
        if: >-
          github.event_name != 'workflow_dispatch' ||
          github.event.inputs.ubuntu_version == '' ||
          github.event.inputs.ubuntu_version == matrix.version
        working-directory: images
        run: |
          packer build \
            -var-file=${{ matrix.varfile }} \
            -var "docker_repository=${REGISTRY}/${IMAGE_NAME}" \
            -var "docker_push=true" \
            -var "docker_login_server=${REGISTRY}" \
            -var "docker_login_username=${{ secrets.REGISTRY_USERNAME }}" \
            -var "docker_login_password=${{ secrets.REGISTRY_PASSWORD }}" \
            .
